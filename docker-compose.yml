services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fieldwise
      POSTGRES_PASSWORD: fieldwise
      POSTGRES_DB: fieldwise
    ports:
      - "5432:5432"
    volumes:
      - fieldwise_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  fieldwise_pg:
